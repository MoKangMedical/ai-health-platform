<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目统计 - AI健康平台</title>
    <style>
        :root { --primary: #00d4ff; --accent: #7c3aed; --bg-dark: #0a0f1a; --text: #ffffff; --text-muted: #94a3b8; --success: #22c55e; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg-dark); color: var(--text); line-height: 1.6; }
        .navbar { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background: rgba(10, 15, 26, 0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1); padding: 0 5%; display: flex; justify-content: space-between; align-items: center; height: 70px; }
        .logo { font-size: 24px; font-weight: 700; background: linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
        .nav-links { display: flex; gap: 30px; list-style: none; }
        .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 15px; transition: color 0.3s; }
        .nav-links a:hover { color: var(--primary); }
        .content { padding: 120px 5% 60px; max-width: 1200px; margin: 0 auto; }
        .page-title { font-size: 42px; font-weight: 700; margin-bottom: 20px; text-align: center; }
        .page-desc { font-size: 18px; color: var(--text-muted); text-align: center; margin-bottom: 60px; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 30px; text-align: center; transition: transform 0.3s; }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-icon { font-size: 40px; margin-bottom: 16px; }
        .stat-value { font-size: 36px; font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
        .stat-label { color: var(--text-muted); font-size: 14px; }
        .detail-section { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 30px; margin-bottom: 20px; }
        .detail-title { font-size: 20px; font-weight: 600; margin-bottom: 20px; }
        .detail-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
        .detail-item { display: flex; justify-content: space-between; padding: 12px; background: rgba(0,0,0,0.2); border-radius: 8px; }
        .detail-label { color: var(--text-muted); }
        .detail-value { font-weight: 600; }
        .footer { padding: 40px 5%; border-top: 1px solid rgba(255,255,255,0.1); text-align: center; color: var(--text-muted); font-size: 14px; }
        .footer a { color: var(--primary); text-decoration: none; }
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .detail-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">🏥 AI健康平台</a>
        <ul class="nav-links">
            <li><a href="index.html">首页</a></li>
            <li><a href="features.html">功能</a></li>
            <li><a href="stats.html">统计</a></li>
            <li><a href="https://github.com/MoKangMedical/ai-health-platform" target="_blank">GitHub</a></li>
        </ul>
    </nav>
    
    <div class="content">
        <h1 class="page-title">项目统计</h1>
        <p class="page-desc">AI健康平台的核心数据指标</p>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">📝</div>
                <div class="stat-value">5,834</div>
                <div class="stat-label">Python代码行数</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🎨</div>
                <div class="stat-value">4,529</div>
                <div class="stat-label">HTML代码行数</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🧪</div>
                <div class="stat-value">48</div>
                <div class="stat-label">测试用例</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🌐</div>
                <div class="stat-value">20+</div>
                <div class="stat-label">API端点</div>
            </div>
        </div>
        
        <div class="detail-section">
            <div class="detail-title">📊 代码统计</div>
            <div class="detail-grid">
                <div class="detail-item">
                    <span class="detail-label">Python文件数</span>
                    <span class="detail-value">25</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">HTML文件数</span>
                    <span class="detail-value">10</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">配置文件数</span>
                    <span class="detail-value">15</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">文档文件数</span>
                    <span class="detail-value">12</span>
                </div>
            </div>
        </div>
        
        <div class="detail-section">
            <div class="detail-title">🤖 AI能力</div>
            <div class="detail-grid">
                <div class="detail-item">
                    <span class="detail-label">语音特征维度</span>
                    <span class="detail-value">59维</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">面部特征维度</span>
                    <span class="detail-value">6维</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">知识图谱节点</span>
                    <span class="detail-value">120+</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">AI Agent数量</span>
                    <span class="detail-value">4个</span>
                </div>
            </div>
        </div>
        
        <div class="detail-section">
            <div class="detail-title">🧪 测试覆盖</div>
            <div class="detail-grid">
                <div class="detail-item">
                    <span class="detail-label">单元测试</span>
                    <span class="detail-value">21个</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">API测试</span>
                    <span class="detail-value">16个</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">集成测试</span>
                    <span class="detail-value">11个</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">通过率</span>
                    <span class="detail-value" style="color: var(--success);">100%</span>
                </div>
            </div>
        </div>
    </div>
    
    <footer class="footer">
        <p>© 2025 AI健康平台 - <a href="https://github.com/MoKangMedical/ai-health-platform">MoKangMedical</a></p>
    </footer>
</body>
</html>
