version: '3.8'

services:
  ai-health-api:
    build: .
    container_name: ai-health-api
    ports:
      - "8200:8200"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    environment:
      - DATABASE_URL=sqlite:///./ai_health.db
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=false
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - ai-health-network

  redis:
    image: redis:7-alpine
    container_name: ai-health-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - ai-health-network

  nginx:
    image: nginx:alpine
    container_name: ai-health-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./static:/usr/share/nginx/html/static
    depends_on:
      - ai-health-api
    restart: unless-stopped
    networks:
      - ai-health-network

volumes:
  redis-data:

networks:
  ai-health-network:
    driver: bridge
