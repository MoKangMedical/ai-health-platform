<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI健康平台 - 控制台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #0a0f1a;
            color: #fff;
            min-height: 100vh;
        }
        
        /* 导航栏 */
        .navbar {
            background: rgba(255,255,255,0.05);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(135deg, #00d4ff 0%, #7c3aed 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-links a {
            color: #94a3b8;
            text-decoration: none;
            margin-left: 30px;
            transition: color 0.3s;
        }
        .nav-links a:hover { color: #00d4ff; }
        
        /* 主布局 */
        .main-layout {
            display: flex;
            min-height: calc(100vh - 60px);
        }
        
        /* 侧边栏 */
        .sidebar {
            width: 250px;
            background: rgba(255,255,255,0.03);
            border-right: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
        }
        .menu-item {
            padding: 12px 15px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 5px;
            transition: background 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .menu-item:hover { background: rgba(255,255,255,0.05); }
        .menu-item.active { background: rgba(0,212,255,0.1); color: #00d4ff; }
        
        /* 内容区 */
        .content {
            flex: 1;
            padding: 30px;
        }
        
        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-label { color: #94a3b8; font-size: 14px; }
        .stat-value { font-size: 32px; font-weight: bold; color: #00d4ff; margin-top: 5px; }
        
        /* 功能面板 */
        .panel {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .panel-title { font-size: 18px; font-weight: bold; }
        
        /* 表单 */
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            color: #94a3b8;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .form-input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }
        .form-input:focus {
            outline: none;
            border-color: #00d4ff;
        }
        textarea.form-input {
            min-height: 100px;
            resize: vertical;
        }
        
        /* 按钮 */
        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            transition: opacity 0.3s;
        }
        .btn:hover { opacity: 0.9; }
        .btn-primary {
            background: linear-gradient(135deg, #00d4ff 0%, #7c3aed 100%);
            color: #fff;
        }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        
        /* 聊天界面 */
        .chat-container {
            height: 400px;
            display: flex;
            flex-direction: column;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .message {
            margin-bottom: 15px;
            display: flex;
        }
        .message.user { justify-content: flex-end; }
        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
        }
        .message.user .message-content {
            background: linear-gradient(135deg, #00d4ff 0%, #7c3aed 100%);
        }
        .message.agent .message-content {
            background: rgba(255,255,255,0.1);
        }
        .chat-input {
            display: flex;
            gap: 10px;
        }
        .chat-input input {
            flex: 1;
            padding: 12px 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: #fff;
        }
        
        /* 检测结果 */
        .result-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
        }
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .score-badge {
            background: linear-gradient(135deg, #00d4ff 0%, #7c3aed 100%);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
        }
        .risk-item {
            display: flex;
            align-items: center;
            padding: 10px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .risk-level {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 12px;
        }
        .risk-level.low { background: #22c55e; }
        .risk-level.medium { background: #f59e0b; }
        .risk-level.high { background: #ef4444; }
        
        /* 配方展示 */
        .ingredient-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }
        .ingredient-item {
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 8px;
            border-left: 3px solid #00d4ff;
        }
        .ingredient-name { font-weight: bold; margin-bottom: 5px; }
        .ingredient-dose { color: #00d4ff; font-size: 18px; }
        .ingredient-reason { color: #94a3b8; font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">AI健康平台</div>
        <div class="nav-links">
            <a href="#dashboard">控制台</a>
            <a href="#detect">健康检测</a>
            <a href="#formula">营养配方</a>
            <a href="#agent">AI助手</a>
            <a href="/docs" target="_blank">API文档</a>
        </div>
    </nav>
    
    <div class="main-layout">
        <aside class="sidebar">
            <div class="menu-item active" onclick="showSection('dashboard')">
                📊 控制台
            </div>
            <div class="menu-item" onclick="showSection('detect')">
                🎤 健康检测
            </div>
            <div class="menu-item" onclick="showSection('formula')">
                💊 营养配方
            </div>
            <div class="menu-item" onclick="showSection('agent')">
                🤖 AI助手
            </div>
            <div class="menu-item" onclick="showSection('history')">
                📋 检测历史
            </div>
            <div class="menu-item" onclick="showSection('orders')">
                📦 我的订单
            </div>
        </aside>
        
        <main class="content">
            <!-- 控制台 -->
            <section id="dashboard" class="section active">
                <h2 style="margin-bottom: 30px;">控制台</h2>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">健康评分</div>
                        <div class="stat-value" id="healthScore">--</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">检测次数</div>
                        <div class="stat-value" id="detectCount">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">配方数量</div>
                        <div class="stat-value" id="formulaCount">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">订阅状态</div>
                        <div class="stat-value" id="subStatus">免费版</div>
                    </div>
                </div>
                
                <div class="panel">
                    <div class="panel-header">
                        <div class="panel-title">快速操作</div>
                    </div>
                    <div style="display: flex; gap: 15px;">
                        <button class="btn btn-primary" onclick="showSection('detect')">开始健康检测</button>
                        <button class="btn btn-secondary" onclick="showSection('formula')">查看配方</button>
                        <button class="btn btn-secondary" onclick="showSection('agent')">咨询AI助手</button>
                    </div>
                </div>
            </section>
            
            <!-- 健康检测 -->
            <section id="detect" class="section" style="display:none;">
                <h2 style="margin-bottom: 30px;">健康检测</h2>
                <div class="panel">
                    <div class="panel-header">
                        <div class="panel-title">多模态健康检测</div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">语音检测</label>
                        <input type="file" id="audioFile" accept="audio/*" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">面部检测</label>
                        <input type="file" id="imageFile" accept="image/*" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">视频检测（可选）</label>
                        <input type="file" id="videoFile" accept="video/*" class="form-input">
                    </div>
                    <button class="btn btn-primary" onclick="startDetection()">开始检测</button>
                </div>
                
                <div id="detectionResult" style="display:none;">
                    <div class="panel">
                        <div class="panel-header">
                            <div class="panel-title">检测结果</div>
                        </div>
                        <div class="result-card">
                            <div class="result-header">
                                <h3>综合健康评分</div>
                                <div class="score-badge" id="resultScore">--</div>
                            </div>
                            <p id="resultSummary" style="color: #94a3b8;"></p>
                        </div>
                        
                        <h4 style="margin: 20px 0 15px;">健康风险</h4>
                        <div id="riskList"></div>
                        
                        <h4 style="margin: 20px 0 15px;">中医体质</h4>
                        <div id="tcmResult"></div>
                        
                        <h4 style="margin: 20px 0 15px;">推荐营养素</h4>
                        <div id="nutrientNeeds"></div>
                    </div>
                </div>
            </section>
            
            <!-- 营养配方 -->
            <section id="formula" class="section" style="display:none;">
                <h2 style="margin-bottom: 30px;">营养配方</h2>
                <div class="panel">
                    <div class="panel-header">
                        <div class="panel-title">我的配方</div>
                        <button class="btn btn-primary" onclick="generateFormula()">生成新配方</button>
                    </div>
                    <div id="formulaList"></div>
                </div>
                
                <div id="formulaDetail" style="display:none;">
                    <div class="panel">
                        <div class="panel-header">
                            <div class="panel-title" id="formulaName">配方详情</div>
                        </div>
                        <div class="ingredient-list" id="ingredientList"></div>
                        <div style="margin-top: 20px;">
                            <h4>服用说明</h4>
                            <p id="formulaInstructions" style="color: #94a3b8; margin-top: 10px; white-space: pre-line;"></p>
                        </div>
                    </div>
                </div>
            </section>
            
            <!-- AI助手 -->
            <section id="agent" class="section" style="display:none;">
                <h2 style="margin-bottom: 30px;">AI健康助手</h2>
                <div class="panel">
                    <div class="panel-header">
                        <div class="panel-title">智能对话</div>
                        <select id="agentSelect" class="form-input" style="width: auto;">
                            <option value="coordinator">小和 - 健康协调员</option>
                            <option value="translator">小译 - 医学翻译</option>
                            <option value="summarizer">小结 - 健康总结</option>
                            <option value="advisor">小智 - 营养顾问</option>
                        </select>
                    </div>
                    <div class="chat-container">
                        <div class="chat-messages" id="chatMessages">
                            <div class="message agent">
                                <div class="message-content">
                                    您好！我是小和，您的AI健康协调员。有什么可以帮您的？
                                </div>
                            </div>
                        </div>
                        <div class="chat-input">
                            <input type="text" id="chatInput" placeholder="输入您的问题..." onkeypress="if(event.key==='Enter')sendMessage()">
                            <button class="btn btn-primary" onclick="sendMessage()">发送</button>
                        </div>
                    </div>
                </div>
            </section>
            
            <!-- 检测历史 -->
            <section id="history" class="section" style="display:none;">
                <h2 style="margin-bottom: 30px;">检测历史</h2>
                <div class="panel">
                    <div id="historyList"></div>
                </div>
            </section>
            
            <!-- 我的订单 -->
            <section id="orders" class="section" style="display:none;">
                <h2 style="margin-bottom: 30px;">我的订单</h2>
                <div class="panel">
                    <div id="orderList"></div>
                </div>
            </section>
        </main>
    </div>
    
    <script>
        const API_BASE = '/api/v1';
        let currentUserId = 1; // 默认用户ID
        
        // 切换页面
        function showSection(sectionId) {
            document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            
            document.getElementById(sectionId).style.display = 'block';
            event.target.classList.add('active');
            
            // 加载数据
            if (sectionId === 'history') loadHistory();
            if (sectionId === 'orders') loadOrders();
            if (sectionId === 'formula') loadFormulas();
        }
        
        // 开始检测
        async function startDetection() {
            const audioFile = document.getElementById('audioFile').files[0];
            const imageFile = document.getElementById('imageFile').files[0];
            
            if (!audioFile && !imageFile) {
                alert('请至少上传一个文件');
                return;
            }
            
            const formData = new FormData();
            formData.append('user_id', currentUserId);
            if (audioFile) formData.append('audio', audioFile);
            if (imageFile) formData.append('image', imageFile);
            
            try {
                const response = await fetch(`${API_BASE}/detect/comprehensive`, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                if (data.status === 'success') {
                    displayDetectionResult(data.report);
                }
            } catch (error) {
                console.error('检测失败:', error);
                alert('检测失败，请重试');
            }
        }
        
        // 显示检测结果
        function displayDetectionResult(report) {
            document.getElementById('detectionResult').style.display = 'block';
            document.getElementById('resultScore').textContent = report.overall_score.toFixed(1);
            document.getElementById('resultSummary').textContent = report.health_summary;
            
            // 显示风险
            const riskList = document.getElementById('riskList');
            riskList.innerHTML = report.risks.map(risk => `
                <div class="risk-item">
                    <div class="risk-level ${risk.level}"></div>
                    <div>
                        <strong>${risk.name}</strong>
                        <div style="color: #94a3b8; font-size: 12px;">${risk.description}</div>
                    </div>
                </div>
            `).join('');
            
            // 显示中医体质
            if (report.tcm_diagnosis) {
                document.getElementById('tcmResult').innerHTML = `
                    <div class="result-card">
                        <p><strong>主要体质：</strong>${report.tcm_diagnosis.primary_type}</p>
                        <p><strong>次要体质：</strong>${report.tcm_diagnosis.secondary_type}</p>
                        <p style="margin-top: 10px;"><strong>建议：</strong></p>
                        <ul style="color: #94a3b8; margin-left: 20px;">
                            ${report.tcm_diagnosis.recommendations.map(r => `<li>${r}</li>`).join('')}
                        </ul>
                    </div>
                `;
            }
            
            // 显示营养需求
            if (report.recommended_ingredients && report.recommended_ingredients.length > 0) {
                document.getElementById('nutrientNeeds').innerHTML = `
                    <div class="ingredient-list">
                        ${report.recommended_ingredients.map(ing => `
                            <div class="ingredient-item">
                                <div class="ingredient-name">${ing}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }
            
            // 更新统计
            document.getElementById('healthScore').textContent = report.overall_score.toFixed(1);
        }
        
        // 加载历史
        async function loadHistory() {
            try {
                const response = await fetch(`${API_BASE}/detect/history/${currentUserId}`);
                const data = await response.json();
                
                if (data.status === 'success') {
                    const historyList = document.getElementById('historyList');
                    historyList.innerHTML = data.records.map(record => `
                        <div class="result-card">
                            <div class="result-header">
                                <div>
                                    <strong>${record.type === 'comprehensive' ? '综合检测' : record.type === 'voice' ? '语音检测' : '面部检测'}</strong>
                                    <div style="color: #94a3b8; font-size: 12px;">${new Date(record.created_at).toLocaleString()}</div>
                                </div>
                                <div class="score-badge">${record.score.toFixed(1)}</div>
                            </div>
                        </div>
                    `).join('');
                    
                    document.getElementById('detectCount').textContent = data.records.length;
                }
            } catch (error) {
                console.error('加载历史失败:', error);
            }
        }
        
        // 加载配方
        async function loadFormulas() {
            try {
                const response = await fetch(`${API_BASE}/formula/user/${currentUserId}`);
                const data = await response.json();
                
                if (data.status === 'success') {
                    const formulaList = document.getElementById('formulaList');
                    formulaList.innerHTML = data.formulas.map(formula => `
                        <div class="result-card" onclick="viewFormula(${formula.id})" style="cursor: pointer;">
                            <div class="result-header">
                                <div>
                                    <strong>${formula.name}</strong>
                                    <div style="color: #94a3b8; font-size: 12px;">${formula.ingredients_count} 种成分</div>
                                </div>
                                <div style="color: #94a3b8; font-size: 12px;">${new Date(formula.created_at).toLocaleDateString()}</div>
                            </div>
                        </div>
                    `).join('') || '<p style="color: #94a3b8;">暂无配方，请先进行健康检测</p>';
                    
                    document.getElementById('formulaCount').textContent = data.formulas.length;
                }
            } catch (error) {
                console.error('加载配方失败:', error);
            }
        }
        
        // 查看配方详情
        async function viewFormula(formulaId) {
            try {
                const response = await fetch(`${API_BASE}/formula/${formulaId}`);
                const data = await response.json();
                
                if (data.status === 'success') {
                    const formula = data.formula;
                    document.getElementById('formulaDetail').style.display = 'block';
                    document.getElementById('formulaName').textContent = formula.name;
                    
                    document.getElementById('ingredientList').innerHTML = formula.ingredients.map(ing => `
                        <div class="ingredient-item">
                            <div class="ingredient-name">${ing.name}</div>
                            <div class="ingredient-dose">${ing.dose}${ing.unit}</div>
                            <div class="ingredient-reason">${ing.reason}</div>
                        </div>
                    `).join('');
                    
                    document.getElementById('formulaInstructions').textContent = formula.instructions;
                }
            } catch (error) {
                console.error('加载配方详情失败:', error);
            }
        }
        
        // 发送消息
        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message) return;
            
            // 显示用户消息
            addMessage(message, 'user');
            input.value = '';
            
            try {
                const agentType = document.getElementById('agentSelect').value;
                const formData = new FormData();
                formData.append('user_id', currentUserId);
                formData.append('message', message);
                formData.append('agent_type', agentType);
                
                const response = await fetch(`${API_BASE}/agent/chat`, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                if (data.status === 'success') {
                    addMessage(data.response, 'agent');
                }
            } catch (error) {
                console.error('发送失败:', error);
                addMessage('抱歉，发生了错误，请重试。', 'agent');
            }
        }
        
        // 添加消息到聊天
        function addMessage(content, type) {
            const chatMessages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.innerHTML = `<div class="message-content">${content.replace(/\n/g, '<br>')}</div>`;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        // 加载订单
        async function loadOrders() {
            try {
                const response = await fetch(`${API_BASE}/orders/${currentUserId}`);
                const data = await response.json();
                
                if (data.status === 'success') {
                    const orderList = document.getElementById('orderList');
                    orderList.innerHTML = data.orders.map(order => `
                        <div class="result-card">
                            <div class="result-header">
                                <div>
                                    <strong>${order.order_no}</strong>
                                    <div style="color: #94a3b8; font-size: 12px;">${new Date(order.created_at).toLocaleString()}</div>
                                </div>
                                <div>
                                    <span class="score-badge">¥${order.amount}</span>
                                    <span style="margin-left: 10px; color: #94a3b8;">${order.status}</span>
                                </div>
                            </div>
                        </div>
                    `).join('') || '<p style="color: #94a3b8;">暂无订单</p>';
                }
            } catch (error) {
                console.error('加载订单失败:', error);
            }
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadHistory();
        });
    </script>
</body>
</html>
